services:
  - type: web
    name: opportunity-ai-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PROJECT_NAME
        value: "Opportunity AI Engine"
      - key: FIREBASE_PROJECT_ID
        value: "opportunity-ai-engine"
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false # User will paste the service account JSON in Render dashboard
      - key: GEMINI_API_KEY
        sync: false # User will paste the Gemini API Key in Render dashboard
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
      - key: HUGGINGFACE_API_KEY
        sync: false # User will paste the Hugging Face API Key in Render dashboard
      - key: HOST
        value: "0.0.0.0"
